services:
  - type: web
    name: childpose-analysis
    runtime: python
    plan: free
    pythonVersion: "3.10.14"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: GEMINI_API_KEY
        sync: false
